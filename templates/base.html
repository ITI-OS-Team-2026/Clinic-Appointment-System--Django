{% load tailwind_tags %}
<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />

    {% tailwind_css %}
</head>
<body class="bg-gray-100 text-gray-900">
    
    <div class="container mx-auto mt-10 p-5 bg-white rounded shadow-lg">
        <h1 class="text-3xl font-bold text-blue-600">Tailwind is working!</h1>
        <p class="mt-4">{% block content %}{% endblock %}</p>
    </div>

</body>
</html>
